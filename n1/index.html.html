<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Clean | Deepak Soni Samples</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .minimal-container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* Profile Section */
        .name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 5px;
            color: #000;
        }

        /* Micro Trust Tagline */
        .trust-tag {
            font-size: 0.8rem;
            font-weight: 700;
            color: #bc13fe; /* Tera signature color hint */
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        .bio {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 45px;
            line-height: 1.5;
        }

        /* Links Section - Optimized Flow */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .link-item {
            padding: 18px;
            text-decoration: none;
            color: #1a1a1a;
            border: 1.5px solid #f2f2f2;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        .link-item:hover {
            border-color: #000;
            background-color: #fafafa;
            transform: translateY(-3px);
        }

        /* Micro Interactions */
        .ig-link:hover { border-color: #e1306c; color: #e1306c; }
        .yt-link:hover { border-color: #ff0000; color: #ff0000; }

        /* Final CTA - Aggressive & Clear */
        .cta-btn {
            display: block;
            background-color: #000;
            color: #fff;
            padding: 22px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .cta-btn:hover {
            background-color: #222;
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .sample-tag {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #bbb;
            font-style: italic;
        }

        footer {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #eee;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="minimal-container">
        <h1 class="name">DEEPAK SONI</h1>
        
        <span class="trust-tag">Clean & Fast Web Systems</span>

        <p class="bio">Digital Brand Architect for creators who value precision and premium identity.</p>

        <div class="links-wrapper">
            <a href="https://www.instagram.com/deepaksonihr21" class="link-item ig-link" target="_blank">DM on Instagram 📸</a>
            <a href="https://youtube.com/@deepaksonihr21" class="link-item yt-link" target="_blank">Watch YouTube 🎥</a>
            <a href="#" class="link-item">My Design Portfolio 📁</a>
            <a href="mailto:deepaksonihr0021@gmail.com" class="link-item">Business Enquiries ✉️</a>
        </div>

        <a href="https://www.instagram.com/deepaksonihr21" class="cta-btn">GET YOUR SITE IN ₹999 🚀</a>

        <p class="sample-tag">Customized design for each unique creator</p>
        <footer>MMXXVI • DEEPAKSONIHR21</footer>
    </div>

</body>
</html>
